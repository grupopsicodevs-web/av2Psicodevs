<!DOCTYPE html>
<html>

<head>
    <title>Personas</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<header>
    <h1>👥 Personas</h1>
</header>

<!-- 🔥 FORMULÁRIO ENTRA AQUI (ANTES DA LISTA) -->
<div class="container">

    <form method="POST">

        <input type="text" name="nome" placeholder="Nome da persona" required>
        <input type="text" name="perfil" placeholder="Perfil" required>
        <input type="text" name="problema" placeholder="Desafio" required>

        <button type="submit">Adicionar persona</button>

    </form>

    <hr>

    <!-- LISTA DE PERSONAS -->
    {% for p in personas %}

    <div class="card">

        <h2>{{ p.nome }}</h2>

        <p>
            <strong>Perfil:</strong>
            {{ p.perfil }}
        </p>

        <br>

        <p>
            <strong>Desafio:</strong>
            {{ p.problema }}
        </p>

    </div>

    {% endfor %}

</div>

<footer>
    PsiCodevs © 2026 - Promovendo bem-estar emocional através da tecnologia
</footer>

</body>
</html>
