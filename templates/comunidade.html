<!DOCTYPE html>
<html>
<head>
    <title>Mensagens de Esperança</title>
    <link rel="stylesheet"
    href="{{ url_for('static',
    filename='style.css') }}">
</head>
<body>

<header>
    <h1>Comunidade</h1>
</header>

<div class="container">

    <div class="card">

        <form method="POST">

            <input type="text"
            name="mensagem"
            placeholder="Registre seus sentimentos, desafios e conquistas. O acompanhamento contínuo ajuda a identificar gatilhos emocionais e fortalecer a recuperação.">

            <button type="submit">
                Enviar
            </button>

        </form>

    </div>

    <div class="card">

        <h2>Mensagens</h2>

        {% for msg in mensagens %}
            <p>{{ msg.texto }}</p>
        {% endfor %}

    </div>

</div>

<footer>
    PsiCodevs © 2026 - Promovendo bem-estar emocional através da tecnologia
</footer>
</body>
</html>
